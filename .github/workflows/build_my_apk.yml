name: Manual Build APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: |
          cd simple_live_core && flutter pub get
          cd ../simple_live_app && flutter pub get

      - name: Prepare Android Properties
        # 这次我们将属性写入 gradle.properties
        # 这是 Gradle 脚本读取 project.property() 优先级最高的文件
        run: |
          mkdir -p simple_live_app/android
          cat <<EOF > simple_live_app/android/gradle.properties
          KEY_PATH=dummy
          KEY_PASSWORD=dummy
          ALIAS=dummy
          ALIAS_PASSWORD=dummy
          EOF
          # 同时也复制一份到 local.properties 以防万一
          cp simple_live_app/android/gradle.properties simple_live_app/android/local.properties

      - name: Build Debug APK
        run: |
          cd simple_live_app
          # 移除了之前报错的无效参数，只保留 Flutter 官方支持的命令
          flutter build apk --debug --no-tree-shake-icons

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-simple-live-apk
          path: simple_live_app/build/app/outputs/flutter-apk/app-debug.apk
