name: Manual Build APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: |
          cd simple_live_core && flutter pub get
          cd ../simple_live_app && flutter pub get

      - name: Patch Gradle Script
        # 针对 image_f203ba.png 中的第 44 行报错进行“外科手术”
        # 这个命令会将代码中所有的 "as String"（强制转换）
        # 替换为 "?.toString() ?: \"\""（安全转换，如果是 null 就给个空字符串）
        # 这样 Gradle 脚本就能跑通，不再报类型转换错误
        run: |
          FILE="simple_live_app/android/app/build.gradle.kts"
          sed -i 's/ as String/?.toString() ?: ""/g' $FILE
          # 打印一下修改后的内容，方便我们在日志里确认是否修改成功
          sed -n '40,50p' $FILE

      - name: Build Debug APK
        run: |
          cd simple_live_app
          # 使用 debug 编译，跳过正式签名校验
          flutter build apk --debug --no-tree-shake-icons

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-simple-live-apk
          path: simple_live_app/build/app/outputs/flutter-apk/app-debug.apk
