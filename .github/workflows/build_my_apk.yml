name: Manual Build APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: |
          cd simple_live_core && flutter pub get
          cd ../simple_live_app && flutter pub get

      - name: Setup Dummy Keys
        # 不再删除代码，而是直接往系统环境里注入假的签名变量
        # 这样 build.gradle.kts 就能读取到值，不会报 null 错误
        run: |
          echo "KEY_PATH=dummy" >> $GITHUB_ENV
          echo "KEY_PASSWORD=dummy" >> $GITHUB_ENV
          echo "ALIAS=dummy" >> $GITHUB_ENV
          echo "ALIAS_PASSWORD=dummy" >> $GITHUB_ENV

      - name: Build Debug APK
        env:
          # 将上面定义的变量传递给编译环境
          KEY_PATH: "dummy"
          KEY_PASSWORD: "dummy"
          ALIAS: "dummy"
          ALIAS_PASSWORD: "dummy"
        run: |
          cd simple_live_app
          # 编译 debug 版本，它实际上并不会真的去校验这些 key 的有效性
          flutter build apk --debug --no-tree-shake-icons

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-simple-live-apk
          path: simple_live_app/build/app/outputs/flutter-apk/app-debug.apk
