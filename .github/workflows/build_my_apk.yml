name: Build Smaller APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: |
          cd simple_live_core && flutter pub get
          cd ../simple_live_app && flutter pub get

      - name: Generate Temporary Keystore
        # Release 模式强制要求签名，我们在这里现场造一个假的
        run: |
          cd simple_live_app/android
          keytool -genkey -v -keystore upload-keystore.jks -allowsearchengine -alias upload -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Unknown, OU=Unknown, O=Unknown, L=Unknown, ST=Unknown, C=Unknown" -storepass 123456 -keypass 123456
          # 将签名信息写入 gradle.properties，喂给编译脚本
          echo "KEY_PATH=upload-keystore.jks" >> gradle.properties
          echo "KEY_PASSWORD=123456" >> gradle.properties
          echo "ALIAS=upload" >> gradle.properties
          echo "ALIAS_PASSWORD=123456" >> gradle.properties

      - name: Patch Gradle Script
        # 沿用之前的补丁，防止脚本因为变量类型报错
        run: |
          FILE="simple_live_app/android/app/build.gradle.kts"
          sed -i 's/ as String/?.toString() ?: ""/g' $FILE

      - name: Build Release APK
        run: |
          cd simple_live_app
          # --release: 开启优化，减小体积
          # --split-per-abi: 将不同架构拆分成独立的 APK
          flutter build apk --release --no-tree-shake-icons --split-per-abi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: smaller-apks
          # 注意：路径变到了 release 文件夹下
          path: simple_live_app/build/app/outputs/flutter-apk/app-*-release.apk
