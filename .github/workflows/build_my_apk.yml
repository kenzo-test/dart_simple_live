name: Manual Build APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: |
          cd simple_live_core && flutter pub get
          cd ../simple_live_app && flutter pub get

      - name: Brute Force Patch Gradle
        # 针对 image_f2f381.png 提到的 44 行报错进行暴力修复
        # 我们直接把 build.gradle.kts 里面尝试读取 keystore 变量的代码行替换掉
        run: |
          FILE="simple_live_app/android/app/build.gradle.kts"
          # 将所有尝试从 project 环境读取并转为 String 的操作替换为固定字符串 "dummy"
          # 这能从根本上解决 "null cannot be cast to String" 的问题
          sed -i 's/as String/"dummy"/g' $FILE
          # 额外保险：把 signingConfigs 块内的逻辑清空
          sed -i '/signingConfigs {/,/}/c\    signingConfigs { }' $FILE
          # 确保 buildType 不再引用那些不存在的配置
          sed -i 's/signingConfig =.*/signingConfig = null/g' $FILE

      - name: Build Debug APK
        run: |
          cd simple_live_app
          flutter build apk --debug --no-tree-shake-icons

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-simple-live-apk
          path: simple_live_app/build/app/outputs/flutter-apk/app-debug.apk
