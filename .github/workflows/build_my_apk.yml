name: Build Mobile Optimized APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: |
          cd simple_live_core && flutter pub get
          cd ../simple_live_app && flutter pub get

      - name: Patch for Mobile Release
        # 1. 修复 image_e8117b.png 中的 null 转换报错
        # 2. 解决 image_e5489b.jpg 中的签名缺失问题，强制 Release 使用 Debug 签名
        run: |
          FILE="simple_live_app/android/app/build.gradle.kts"
          sed -i 's/ as String/?.toString() ?: ""/g' $FILE
          sed -i 's/signingConfig = signingConfigs.getByName("release")/signingConfig = signingConfigs.getByName("debug")/g' $FILE

      - name: Build Release APK
        run: |
          cd simple_live_app
          # 针对现代手机，我们不再拆分架构，直接打一个通用的 Release 包
          # 这样你只需要下载一个文件，就能在绝大多数手机上运行
          flutter build apk --release --no-tree-shake-icons

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-release-apk
          path: simple_live_app/build/app/outputs/flutter-apk/app-release.apk
