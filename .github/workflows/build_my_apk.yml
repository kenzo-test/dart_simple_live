name: Build v8a Optimized APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: |
          cd simple_live_core && flutter pub get
          cd ../simple_live_app && flutter pub get

      - name: Patch Gradle and Signing
        # 1. 修复之前遇到的 null 转换错误
        # 2. 强制 Release 模式借用 Debug 签名，绕过 keystore 缺失报错
        run: |
          FILE="simple_live_app/android/app/build.gradle.kts"
          sed -i 's/ as String/?.toString() ?: ""/g' $FILE
          sed -i 's/signingConfig = signingConfigs.getByName("release")/signingConfig = signingConfigs.getByName("debug")/g' $FILE

      - name: Build v8a Release APK
        run: |
          cd simple_live_app
          # --release: 启用代码压缩和混淆
          # --split-per-abi: 触发架构拆分，减小单个 APK 体积
          flutter build apk --release --no-tree-shake-icons --split-per-abi

      - name: Upload v8a Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-v8a-apk
          # 仅上传 arm64-v8a 架构的安装包
          path: simple_live_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
