name: Manual Build APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: |
          cd simple_live_core && flutter pub get
          cd ../simple_live_app && flutter pub get

      - name: Build Debug APK
        run: |
          cd simple_live_app
          # 通过 -P 参数直接注入 Gradle 属性，确保脚本中的变量不为 null
          # 这样可以绕过 build.gradle.kts 里的类型转换报错
          flutter build apk --debug --no-tree-shake-icons --dart-define=dummy=true \
            --client-id-content=dummy \
            --client-secret-content=dummy \
            --gradle-switches="-PKEY_PATH=dummy -PKEY_PASSWORD=dummy -PALIAS=dummy -PALIAS_PASSWORD=dummy"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-simple-live-apk
          path: simple_live_app/build/app/outputs/flutter-apk/app-debug.apk
