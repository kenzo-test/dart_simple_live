name: Manual Build APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: |
          cd simple_live_core && flutter pub get
          cd ../simple_live_app && flutter pub get

      - name: Create local.properties
        # 直接创建属性文件，填入 dummy 字符串
        # 这样 Gradle 脚本在执行 (as String) 时会读到 "dummy" 而不是 null
        run: |
          printf "KEY_PATH=dummy\nKEY_PASSWORD=dummy\nALIAS=dummy\nALIAS_PASSWORD=dummy" > simple_live_app/android/local.properties

      - name: Build Debug APK
        run: |
          cd simple_live_app
          # 编译 Debug 版，它会读取上面的属性文件但不会真的校验密钥有效性
          flutter build apk --debug --no-tree-shake-icons

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-simple-live-apk
          path: simple_live_app/build/app/outputs/flutter-apk/app-debug.apk
