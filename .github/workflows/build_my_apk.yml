name: Build Smaller APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: |
          cd simple_live_core && flutter pub get
          cd ../simple_live_app && flutter pub get

      - name: Generate Temporary Keystore
        # 删除了那个报错的非法参数，现在是标准命令
        run: |
          cd simple_live_app/android
          keytool -genkeypair -v -keystore upload-keystore.jks -alias upload -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Unknown, OU=Unknown, O=Unknown, L=Unknown, ST=Unknown, C=Unknown" -storepass 123456 -keypass 123456
          echo "KEY_PATH=upload-keystore.jks" >> gradle.properties
          echo "KEY_PASSWORD=123456" >> gradle.properties
          echo "ALIAS=upload" >> gradle.properties
          echo "ALIAS_PASSWORD=123456" >> gradle.properties

      - name: Patch Gradle Script
        # 继续沿用这个补丁，防止 Kotlin 类型强转报错
        run: |
          FILE="simple_live_app/android/app/build.gradle.kts"
          sed -i 's/ as String/?.toString() ?: ""/g' $FILE

      - name: Build Release APK
        run: |
          cd simple_live_app
          # 使用 --release 模式并按架构拆分
          flutter build apk --release --no-tree-shake-icons --split-per-abi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: smaller-apks
          path: simple_live_app/build/app/outputs/flutter-apk/app-*-release.apk
